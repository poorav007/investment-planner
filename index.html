<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STI Goal Planner — SIP Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #8a8a8a;
    --paper: #faf8f4;
    --paper-2: #f0ece4;
    --paper-3: #e4ddd0;
    --gold: #c8a84b;
    --gold-light: #f0e4b8;
    --gold-dark: #9a7a2c;
    --green: #2d6a4f;
    --green-light: #d8f0e4;
    --amber: #92480c;
    --amber-light: #fdebd0;
    --red: #8b2020;
    --red-light: #fde8e8;
    --blue: #1a3d6e;
    --blue-light: #dce8f8;
    --radius: 12px;
    --radius-sm: 6px;
    --shadow: 0 2px 12px rgba(26,26,26,0.08);
    --shadow-lg: 0 8px 32px rgba(26,26,26,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2.5rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 1.5px solid rgba(200,168,75,0.3);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -60px; right: 60px;
    width: 150px; height: 150px;
    border-radius: 50%;
    border: 1px solid rgba(200,168,75,0.15);
  }
  .header-inner { max-width: 820px; margin: 0 auto; position: relative; }
  .header-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: .75rem;
    display: flex; align-items: center; gap: 8px;
  }
  .header-tag::before {
    content: '';
    display: inline-block;
    width: 20px; height: 1px;
    background: var(--gold);
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    line-height: 1.15;
    color: var(--paper);
    margin-bottom: .5rem;
    font-weight: 400;
  }
  h1 em { color: var(--gold); font-style: italic; }
  .header-sub {
    font-size: 14px;
    color: rgba(250,248,244,0.6);
    font-weight: 300;
    max-width: 460px;
  }

  /* MAIN */
  main { max-width: 820px; margin: 0 auto; padding: 2rem; }

  /* SECTION LABELS */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--paper-3);
  }

  /* CARDS */
  .card {
    background: #fff;
    border: 0.5px solid var(--paper-3);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 1.25rem;
  }
  .card-head {
    padding: 1.1rem 1.5rem;
    border-bottom: 0.5px solid var(--paper-3);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-head-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--ink);
  }
  .card-body { padding: 1.5rem; }

  /* GOAL BLOCK */
  .goal-block {
    background: #fff;
    border: 0.5px solid var(--paper-3);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .goal-block:hover { box-shadow: var(--shadow-lg); }
  .goal-block-head {
    background: var(--paper);
    padding: .9rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid var(--paper-3);
  }
  .goal-number {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: flex; align-items: center; gap: 8px;
  }
  .goal-num-badge {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
  }
  .remove-btn {
    font-size: 12px;
    color: var(--ink-3);
    background: none;
    border: 0.5px solid var(--paper-3);
    border-radius: var(--radius-sm);
    padding: 3px 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .remove-btn:hover { color: var(--red); border-color: #f0b0b0; background: var(--red-light); }

  .goal-block-body { padding: 1.25rem 1.5rem; }

  /* FIELD GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    letter-spacing: .01em;
  }
  .field .hint {
    font-size: 11px;
    color: var(--ink-3);
    font-weight: 300;
    margin-top: 2px;
  }
  .field input, .field select {
    width: 100%;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    border: 0.5px solid var(--paper-3);
    border-radius: var(--radius-sm);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--gold);
    background: #fff;
  }
  .field input.inp-highlight { border-color: #d4c070; background: #fdfbf0; }
  .field input.inp-highlight:focus { border-color: var(--gold); background: #fff; }
  .field .err-msg {
    font-size: 11px;
    color: var(--red);
    display: none;
    margin-top: 2px;
  }

  /* BUTTONS */
  .add-goal-btn {
    width: 100%;
    padding: 13px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    color: var(--ink-2);
    background: none;
    border: 0.5px dashed var(--paper-3);
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: .02em;
    transition: all .2s;
  }
  .add-goal-btn:hover {
    background: var(--paper);
    border-color: var(--gold);
    color: var(--ink);
  }

  .calc-btn {
    width: 100%;
    padding: 16px;
    font-size: 15px;
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    color: var(--paper);
    background: var(--ink);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: .02em;
    transition: all .2s;
    margin-top: .5rem;
    position: relative;
    overflow: hidden;
  }
  .calc-btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(200,168,75,0.2);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width .4s, height .4s;
  }
  .calc-btn:hover::before { width: 600px; height: 600px; }
  .calc-btn:hover { background: #2a2a2a; }
  .calc-btn:active { transform: scale(0.99); }

  /* RESULTS */
  #results-area { margin-top: 2rem; animation: fadeUp .4s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* SUMMARY BAR */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .summary-card {
    background: #fff;
    border: 0.5px solid var(--paper-3);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    box-shadow: var(--shadow);
  }
  .summary-card .sc-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: .4rem;
  }
  .summary-card .sc-val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.1;
  }
  .summary-card .sc-sub { font-size: 11px; color: var(--ink-3); margin-top: 3px; }
  .sc-green .sc-val { color: var(--green); }
  .sc-amber .sc-val { color: var(--amber); }

  /* RESULT CARDS */
  .result-card {
    background: #fff;
    border: 0.5px solid var(--paper-3);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .result-head {
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid var(--paper-3);
    background: var(--paper);
  }
  .result-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    display: flex; align-items: center; gap: 10px;
  }
  .bucket-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    display: inline-block;
  }
  .bucket-short { background: var(--green-light); color: var(--green); }
  .bucket-mid { background: var(--blue-light); color: var(--blue); }
  .bucket-long { background: var(--gold-light); color: var(--gold-dark); }

  .status-ok {
    font-size: 12px; font-weight: 500;
    color: var(--green); background: var(--green-light);
    padding: 4px 12px; border-radius: 20px;
    display: flex; align-items: center; gap: 5px;
  }
  .status-warn {
    font-size: 12px; font-weight: 500;
    color: var(--amber); background: var(--amber-light);
    padding: 4px 12px; border-radius: 20px;
  }

  .result-metrics {
    padding: 1.25rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    border-bottom: 0.5px solid var(--paper-3);
  }
  .metric { display: flex; flex-direction: column; gap: 3px; }
  .metric .ml {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .metric .mv {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
    line-height: 1.1;
  }
  .metric .ms { font-size: 11px; color: var(--ink-3); }

  .result-instrument {
    padding: .9rem 1.5rem;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    background: var(--paper);
  }
  .instr-label { font-size: 11px; color: var(--ink-3); font-weight: 500; }
  .instr-pill {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--paper-3);
    background: #fff;
    color: var(--ink-2);
  }

  .result-tweaks {
    padding: .75rem 1.5rem;
    background: var(--amber-light);
    border-top: 0.5px solid #f0d4a8;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .tweak-head { font-size: 11px; font-weight: 500; color: var(--amber); }
  .tweak-pill {
    font-size: 12px; padding: 3px 10px;
    border-radius: 20px; background: rgba(255,255,255,0.7);
    color: var(--amber); border: 0.5px solid rgba(146,72,12,0.2);
  }

  /* REFERENCE TABLE */
  .ref-card {
    background: #fff;
    border: 0.5px solid var(--paper-3);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-top: 1.5rem;
    overflow: hidden;
  }
  .ref-head {
    padding: 1rem 1.5rem;
    border-bottom: 0.5px solid var(--paper-3);
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    font-weight: 400;
    background: var(--paper);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ref-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-family: 'DM Sans', sans-serif;
  }
  table.ref-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ref-table th {
    text-align: left; padding: 10px 1.5rem;
    font-size: 10px; font-weight: 500;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--ink-3);
    border-bottom: 0.5px solid var(--paper-3);
    background: var(--paper);
  }
  .ref-table td {
    padding: 12px 1.5rem;
    border-bottom: 0.5px solid var(--paper-2);
    color: var(--ink-2);
    vertical-align: top;
  }
  .ref-table tr:last-child td { border-bottom: none; }
  .ref-table td:first-child { font-weight: 500; color: var(--ink); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 12px;
    color: var(--ink-3);
    border-top: 0.5px solid var(--paper-3);
    margin-top: 3rem;
  }
  footer strong { color: var(--ink-2); }

  /* PROGRESS BAR */
  .progress-wrap { margin-top: 8px; }
  .progress-bar {
    height: 4px;
    background: var(--paper-3);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .6s ease;
  }
  .progress-green { background: var(--green); }
  .progress-amber { background: var(--gold); }
  .progress-red { background: var(--red); }
  .progress-label { font-size: 11px; color: var(--ink-3); margin-top: 3px; }

  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr; }
    .result-metrics { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-tag">STI Goal Planner</div>
    <h1>Plan your goals.<br><em>Know your SIP.</em></h1>
    <p class="header-sub">Enter each financial goal below — the calculator tells you exactly how much to invest each month, and where to invest it.</p>
  </div>
</header>

<main>

  <!-- GOALS INPUT SECTION -->
  <section style="margin-top:2rem">
    <div class="section-label">Step 1 — Your goals</div>

    <div id="goals-container"></div>

    <button class="add-goal-btn" onclick="addGoal()">＋ Add another goal</button>
  </section>

  <section style="margin-top:1.5rem">
    <button class="calc-btn" onclick="calculate()">Calculate my SIP plan →</button>
  </section>

  <!-- RESULTS -->
  <div id="results-area" style="display:none"></div>

</main>

<footer>
  Built on the <strong>STI Master Calci</strong> framework &mdash; inflation-adjusted, SIP-powered goal planning.
</footer>

<script>
let goalId = 0;
const TODAY = new Date();

function fmt(n) {
  return '₹' + Math.abs(Math.round(n)).toLocaleString('en-IN');
}
function fmtPct(n) {
  return (n * 100).toFixed(1) + '%';
}
function defaultDate(yearsAhead) {
  const d = new Date();
  d.setFullYear(d.getFullYear() + (yearsAhead || 2));
  return d.toISOString().split('T')[0];
}
function todayStr() {
  return TODAY.toISOString().split('T')[0];
}

function addGoal(defaults) {
  const id = ++goalId;
  const d = defaults || {};
  const el = document.createElement('div');
  el.className = 'goal-block';
  el.id = 'goal-' + id;
  el.innerHTML = `
    <div class="goal-block-head">
      <span class="goal-number">
        <span class="goal-num-badge">${id}</span>
        Goal ${id}
      </span>
      <button class="remove-btn" onclick="removeGoal(${id})">Remove</button>
    </div>
    <div class="goal-block-body">
      <div class="grid-2" style="margin-bottom:1rem">
        <div class="field">
          <label>Goal name</label>
          <input type="text" id="name-${id}" value="${d.name || ''}" placeholder="e.g. Europe Trip, New Car, House Down Payment">
          <span class="hint">What are you saving for?</span>
        </div>
        <div class="field">
          <label>Target date</label>
          <input type="date" id="date-${id}" value="${d.date || defaultDate(2)}" min="${todayStr()}">
          <span class="hint">When do you need the money?</span>
          <span class="err-msg" id="date-err-${id}">Please select a future date.</span>
        </div>
      </div>
      <div class="grid-3" style="margin-bottom:1rem">
        <div class="field">
          <label>Amount needed today (₹)</label>
          <input type="number" class="inp-highlight" id="amt-${id}" value="${d.amt || 100000}" min="1" step="1000">
          <span class="hint">How much would it cost right now?</span>
          <span class="err-msg" id="amt-err-${id}">Enter a positive amount.</span>
        </div>
        <div class="field">
          <label>Inflation rate (%)</label>
          <input type="number" class="inp-highlight" id="infl-${id}" value="${d.infl || 6}" min="0" max="20" step="0.5">
          <span class="hint">How fast prices rise per year (usually 5–7%)</span>
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="priority-${id}">
            <option value="1">1 — Must have</option>
            <option value="2">2 — Very important</option>
            <option value="3" selected>3 — Important</option>
            <option value="4">4 — Nice to have</option>
            <option value="5">5 — Optional</option>
          </select>
          <span class="hint">Rank against your other goals (1 = top)</span>
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label>Savings already set aside (₹)</label>
          <input type="number" class="inp-highlight" id="corpus-${id}" value="${d.corpus || 0}" min="0" step="1000">
          <span class="hint">Existing money earmarked for this goal</span>
        </div>
        <div class="field">
          <label>Current monthly investment (₹)</label>
          <input type="number" class="inp-highlight" id="monthly-${id}" value="${d.monthly || 0}" min="0" step="500">
          <span class="hint">How much you already invest for this each month</span>
        </div>
        <div class="field">
          <label>Expected annual return (%)</label>
          <input type="number" class="inp-highlight" id="ret-${id}" value="${d.ret || 8}" min="1" max="20" step="0.5">
          <span class="hint">Leave as default or adjust for your risk comfort</span>
        </div>
      </div>
    </div>
  `;
  document.getElementById('goals-container').appendChild(el);
  if (d.priority) document.getElementById('priority-' + id).value = d.priority;
}

function removeGoal(id) {
  const el = document.getElementById('goal-' + id);
  if (el) el.remove();
}

function getBucket(years) {
  if (years * 365 <= 90) return '0-90 days';
  if (years <= 3) return '90D-3Y';
  return '>3Y';
}

function bucketTag(bucket) {
  if (bucket === '0-90 days') return `<span class="bucket-tag bucket-short">Short-term</span>`;
  if (bucket === '90D-3Y') return `<span class="bucket-tag bucket-mid">Medium-term</span>`;
  return `<span class="bucket-tag bucket-long">Long-term</span>`;
}

function getInstrument(bucket) {
  if (bucket === '0-90 days') return { name: 'Savings A/c or Sweep FD', risk: 'Very Low', ret: '6%' };
  if (bucket === '90D-3Y') return { name: 'Liquid Funds / Low-Duration Debt Fund', risk: 'Low–Moderate', ret: '7.5%' };
  return { name: 'Conservative Hybrid / Equity Savings Funds / AAA Corp Bond', risk: 'Moderate–High', ret: '10%' };
}

function calculate() {
  const rows = document.querySelectorAll('.goal-block');
  if (!rows.length) { alert('Please add at least one goal first.'); return; }

  let valid = true;
  let goals = [];

  rows.forEach(row => {
    const id = row.id.replace('goal-', '');

    const dateVal = document.getElementById('date-' + id).value;
    const amt = parseFloat(document.getElementById('amt-' + id).value) || 0;
    const infl = parseFloat(document.getElementById('infl-' + id).value) / 100 || 0.06;
    const corpus = parseFloat(document.getElementById('corpus-' + id).value) || 0;
    const monthly = parseFloat(document.getElementById('monthly-' + id).value) || 0;
    const ret = parseFloat(document.getElementById('ret-' + id).value) / 100 || 0.08;
    const priority = parseInt(document.getElementById('priority-' + id).value) || 3;
    const name = document.getElementById('name-' + id).value.trim() || ('Goal ' + id);

    document.getElementById('date-err-' + id).style.display = 'none';
    document.getElementById('amt-err-' + id).style.display = 'none';

    const targetDate = new Date(dateVal);
    const diffDays = (targetDate - TODAY) / 86400000;
    const years = Math.round((diffDays / 365) * 100) / 100;

    if (!dateVal || diffDays <= 0) {
      document.getElementById('date-err-' + id).style.display = 'block';
      valid = false; return;
    }
    if (amt <= 0) {
      document.getElementById('amt-err-' + id).style.display = 'block';
      valid = false; return;
    }

    // Core formula: inflation-adjusted future value minus existing corpus
    const inflAdj = amt * Math.pow(1 + infl, years) - corpus;
    const monthlyRate = Math.pow(1 + ret, 1 / 12) - 1;
    const n = Math.max(1, Math.round(years * 12));

    // PMT formula: required monthly SIP
    let requiredSIP = 0;
    if (monthlyRate > 0) {
      requiredSIP = inflAdj * monthlyRate / (Math.pow(1 + monthlyRate, n) - 1);
    } else {
      requiredSIP = inflAdj / n;
    }
    requiredSIP = Math.max(0, requiredSIP);

    const gap = monthly - requiredSIP;
    const onTrack = gap >= 0;
    const bucket = getBucket(years);
    const coveragePct = requiredSIP > 0 ? Math.min(100, (monthly / requiredSIP) * 100) : 100;

    let tweakRisk = '', tweakTime = '', tweakBudget = '';
    if (!onTrack) {
      if (priority <= 2) tweakRisk = 'Consider higher-return instruments (TMF / Corp Bonds)';
      if (priority >= 4) tweakTime = 'Push goal by 6–12 months';
      tweakBudget = 'Rework budget or add a lump sum';
    }

    goals.push({ id, name, years, amt, infl, inflAdj, requiredSIP, monthly, gap, onTrack, bucket, ret, priority, coveragePct, tweakRisk, tweakTime, tweakBudget });
  });

  if (!valid) return;

  goals.sort((a, b) => a.priority - b.priority);

  const totalRequired = goals.reduce((s, g) => s + g.requiredSIP, 0);
  const totalCurrent = goals.reduce((s, g) => s + g.monthly, 0);
  const totalGap = totalCurrent - totalRequired;
  const allOnTrack = goals.every(g => g.onTrack);

  let html = `<div class="section-label" style="margin-top:2rem">Step 2 — Your SIP plan</div>`;

  // Summary
  html += `
    <div class="summary-grid">
      <div class="summary-card">
        <div class="sc-label">Total SIP needed</div>
        <div class="sc-val">${fmt(totalRequired)}<span style="font-family:'DM Sans';font-size:14px;color:var(--ink-3)">/mo</span></div>
        <div class="sc-sub">Across ${goals.length} goal${goals.length > 1 ? 's' : ''}</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">You currently invest</div>
        <div class="sc-val">${fmt(totalCurrent)}<span style="font-family:'DM Sans';font-size:14px;color:var(--ink-3)">/mo</span></div>
        <div class="sc-sub">Across all goals</div>
      </div>
      <div class="summary-card ${totalGap >= 0 ? 'sc-green' : 'sc-amber'}">
        <div class="sc-label">Net ${totalGap >= 0 ? 'surplus' : 'shortfall'}</div>
        <div class="sc-val">${fmt(Math.abs(totalGap))}<span style="font-family:'DM Sans';font-size:14px;color:var(--ink-3)">/mo</span></div>
        <div class="sc-sub">${totalGap >= 0 ? 'Great — you are ahead' : 'Needs attention'}</div>
      </div>
    </div>
  `;

  goals.forEach(g => {
    const instr = getInstrument(g.bucket);
    const barClass = g.coveragePct >= 100 ? 'progress-green' : g.coveragePct >= 70 ? 'progress-amber' : 'progress-red';
    const tweaksHtml = (!g.onTrack && (g.tweakRisk || g.tweakTime || g.tweakBudget)) ? `
      <div class="result-tweaks">
        <span class="tweak-head">Action tips →</span>
        ${g.tweakRisk ? `<span class="tweak-pill">${g.tweakRisk}</span>` : ''}
        ${g.tweakTime ? `<span class="tweak-pill">${g.tweakTime}</span>` : ''}
        ${g.tweakBudget ? `<span class="tweak-pill">${g.tweakBudget}</span>` : ''}
      </div>` : '';

    html += `
      <div class="result-card">
        <div class="result-head">
          <span class="result-name">${g.name} ${bucketTag(g.bucket)}</span>
          ${g.onTrack
            ? `<span class="status-ok">✓ On Track</span>`
            : `<span class="status-warn">⚠ Shortfall: ${fmt(Math.abs(g.gap))}/mo</span>`}
        </div>
        <div class="result-metrics">
          <div class="metric">
            <span class="ml">Inflation-adjusted target</span>
            <span class="mv">${fmt(g.inflAdj)}</span>
            <span class="ms">${fmt(g.amt)} today → future value at ${fmtPct(g.infl)} inflation over ${g.years.toFixed(1)} yrs</span>
          </div>
          <div class="metric">
            <span class="ml">Required monthly SIP</span>
            <span class="mv">${fmt(g.requiredSIP)}/mo</span>
            <span class="ms">At ${fmtPct(g.ret)} annual return</span>
            <div class="progress-wrap">
              <div class="progress-bar"><div class="progress-fill ${barClass}" style="width:${Math.min(g.coveragePct,100).toFixed(0)}%"></div></div>
              <div class="progress-label">${g.coveragePct.toFixed(0)}% funded by current investment</div>
            </div>
          </div>
          <div class="metric">
            <span class="ml">Your current investment</span>
            <span class="mv">${fmt(g.monthly)}/mo</span>
            <span class="ms">${g.onTrack ? 'Sufficient for this goal ✓' : 'Needs to increase by ' + fmt(Math.abs(g.gap))}</span>
          </div>
        </div>
        <div class="result-instrument">
          <span class="instr-label">Suggested instrument:</span>
          <span class="instr-pill" style="font-weight:500;color:var(--ink)">${instr.name}</span>
          <span class="instr-pill">Risk: ${instr.risk}</span>
          <span class="instr-pill">Typical return: ${instr.ret}</span>
          <span class="instr-pill">${g.years.toFixed(1)} years to goal</span>
        </div>
        ${tweaksHtml}
      </div>`;
  });

  // Reference table
  html += `
    <div class="ref-card">
      <div class="ref-head">
        Investment options guide
        <span class="ref-tag">Reference</span>
      </div>
      <table class="ref-table">
        <thead>
          <tr>
            <th>Time horizon</th>
            <th>Suggested instrument</th>
            <th>Typical return</th>
            <th>Risk</th>
            <th>Taxation</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>0–90 days</td>
            <td>Savings A/c / Sweep FD</td>
            <td>6%</td>
            <td><span class="bucket-tag bucket-short" style="font-size:10px">Very Low</span></td>
            <td>Taxable as per slab</td>
          </tr>
          <tr>
            <td>90 days – 3 years</td>
            <td>Liquid Funds / Low-Duration Debt Fund</td>
            <td>7.5%</td>
            <td><span class="bucket-tag bucket-mid" style="font-size:10px">Low–Moderate</span></td>
            <td>Taxable as per slab</td>
          </tr>
          <tr>
            <td>More than 3 years</td>
            <td>Conservative Hybrid / Equity Savings Funds / AAA Corp Bond</td>
            <td>10%</td>
            <td><span class="bucket-tag bucket-long" style="font-size:10px">Moderate–High</span></td>
            <td>LTCG 12.5% over ₹1.25L; STCG 20%</td>
          </tr>
          <tr>
            <td>3+ years (equity focus)</td>
            <td>Arbitrage Mutual Funds</td>
            <td>7.5%</td>
            <td><span class="bucket-tag bucket-mid" style="font-size:10px">Very Low</span></td>
            <td>LTCG 12.5% over ₹1.25L; STCG 20%</td>
          </tr>
        </tbody>
      </table>
    </div>`;

  const area = document.getElementById('results-area');
  area.innerHTML = html;
  area.style.display = 'block';
  setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

// Load with one example goal pre-filled
addGoal({ name: 'Europe Trip', date: '2028-04-20', amt: 100000, infl: 6, corpus: 0, monthly: 5000, ret: 8, priority: 1 });
